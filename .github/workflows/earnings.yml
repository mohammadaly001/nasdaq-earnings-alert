name: Nasdaq Earnings Alert

on:
  schedule:
    # 02:30 UTC = 07:00 Asia/Kabul (UTC+4:30, no daylight saving in Afghanistan).
    # Runs Mon-Fri UTC, which aligns with US trading days.
    - cron: "30 2 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: earnings-alert-state
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run morning alert
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python send_morning_alert.py

      - name: Commit updated state
        if: success()
        run: |
          git config user.name "earnings-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/sent_alerts.json
          git diff --cached --quiet || git commit -m "chore: update alert state [skip ci]"
          git push
